<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Movie Database</title>
        <link rel="stylesheet" href="./styles/style.css" />
        <link rel="stylesheet" href="./dist/output.css">
        <script
            src="https://kit.fontawesome.com/f300007e95.js"
            crossorigin="anonymous"
        ></script>
        <script type="module" src="./scripts/script.js"></script>
    </head>
    <body>
        <header class="header">
            <div class="content-wrapper header__flex">
                <a href="index.html"
                    ><img
                        class="header__logo"
                        src="./res/logo.svg"
                        alt="logotype"
                /></a>
                <form class="header__form" id="searchForm">
                    <section class="search-list-container">
                        <input
                            class="header__input"
                            id="searchInput"
                            type="text"
                            aria-label="Search"
                            />
                        <ul class="section__search-list" id="searchList">
                            <li class="section__search-item">The Batman</li>
                        </ul>
                        <button class="header__form-btn" id="searchBtn">
                            Search
                        </button>
                    </section>
                </form>
                <a href="./favorites.html" class="header__fav-btn" id="favBtn"
                >Favorites</a
                >
            </div>
            <hr class="header__line line">
        </header>

        <!-- Trailer Caroussel -->
        <section>
            <div class="content-wrapper">
                
                <section class="trailers">
                    <img
                        src="./res/icons/arrow-left.svg"
                        alt="left navigation arrow"
                        class="trailers__arrow trailers__arrow--left"
                        data-direction="left"
                    />
                    <img
                        src="./res/icons/arrow-right.svg"
                        alt="right navigation arrow"
                        class="trailers__arrow trailers__arrow--right"
                        data-direction="right"
                    />
                    <section class="trailers__container"></section>
                </section>
            </div>
        </section>

        <!-- Our recommended movies section -->
        <main class="recmnd">
            <div class="content-wrapper center recmnd__wrapper">
                <h2 class="recmnd__title">OUR RECOMMENDATIONS:</h2>
                <hr class="recmnd__line line">
                <section class="recmnd-section" id="recommendSection">

                <!--
                    <article class="movie">
                        <img src="https://m.media-amazon.com/images/M/MV5BN2NhMDk2MmEtZDQzOC00MmY5LThhYzAtMDdjZGFjOGZjMjdjXkEyXkFqcGc@._V1_SX300.jpg" alt="Alien" class="movie__poster">
                        <h3 class="movie__title">Alien</h3>
                        <p class="movie__id">imdbID: tt0078748</p>
                    </article>
                -->

                </section>
            </div>
        </main>
    </body>
</html>
